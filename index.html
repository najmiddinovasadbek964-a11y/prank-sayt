<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Account Portal</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
  <h1>👤 Account Login</h1>

  <input id="user" placeholder="Enter username">
  <input id="pass" type="password" placeholder="Enter password">

  <button id="btn" onclick="login()">Sign in</button>

  <p id="msg"></p>
</div>

<div id="loading">
  <h2>Checking account...</h2>
  <div class="bar"></div>
</div>

<div id="prank">
  <h1>🎉 Welcome!</h1>

  <img src="gorilla.jpg">

  <audio id="sound" src="laugh.mp3"></audio>
</div>

<script src="script.js"></script>
</body>
</html>
